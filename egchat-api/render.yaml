services:
  - type: web
    name: egchat-api
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_VERSION
        value: 2.5.1
      - key: CORS_ALLOWED_ORIGINS
        value: https://egchat-app.vercel.app,http://localhost:3001,http://localhost:3003,http://localhost:5173,http://127.0.0.1:3001
      # Asegúrate de configurar JWT_SECRET en Render Dashboard si no quieres almacenarlo aquí.
