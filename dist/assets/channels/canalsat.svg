<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="32" fill="#1E3A5F"/>
  <!-- Satellite dish body -->
  <ellipse cx="85" cy="108" rx="44" ry="40" fill="none" stroke="#90CAF9" stroke-width="6" transform="rotate(-25 85 108)"/>
  <ellipse cx="85" cy="108" rx="28" ry="25" fill="rgba(144,202,249,0.12)" stroke="#90CAF9" stroke-width="3" transform="rotate(-25 85 108)"/>
  <!-- Arm -->
  <line x1="85" y1="108" x2="132" y2="62" stroke="#90CAF9" stroke-width="5" stroke-linecap="round"/>
  <!-- Signal point -->
  <circle cx="135" cy="59" r="7" fill="#FFD700"/>
  <!-- Signal arcs -->
  <path d="M145 49 Q158 59 145 69" stroke="#FFD700" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M152 42 Q170 59 152 76" stroke="#FFD700" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
  <text x="100" y="162" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="1">CANAL SAT</text>
  <text x="100" y="180" font-family="Arial, sans-serif" font-size="10" fill="#90CAF9" text-anchor="middle">GUINEA ECUATORIAL</text>
</svg>