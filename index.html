<!DOCTYPE html>
<html lang="es" style="background:#f0f2f5">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/egchat-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>EGCHAT v2.5.1</title>
    <meta name="description" content="EGCHAT v2.5.1 - Super App Guinea Ecuatorial" />
    <meta name="cache-control" content="no-cache, no-store, must-revalidate" />
    <meta name="pragma" content="no-cache" />
    <meta name="expires" content="0" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS / Safari PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EGCHAT" />
    <link rel="apple-touch-icon" href="/logo-transparent.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/logo-transparent.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/logo-transparent.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo-transparent.png" />

    <!-- Theme color — coincide con el fondo de la app para evitar parpadeo en iOS Safari -->
    <meta name="theme-color" content="#f0f2f5" />
    <meta name="msapplication-TileColor" content="#f0f2f5" />

    <!-- Anti-flash inline: fondo del body antes de que cargue el CSS -->
    <style>
      html, body, #root {
        background-color: #f0f2f5 !important;
        margin: 0;
      }
    </style>
  </head>
  <body style="background:#f0f2f5">
    <div id="root" style="background:#f0f2f5"></div>
    <script type="module" src="/main.tsx"></script>
    
    <!-- Forzar limpieza de SW y cache antigua -->
    <script>
      // Eliminar SW y caché completamente
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
        if ('caches' in window) caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
      }
      // Status bar height para Android WebView (Capacitor)
      (function() {
        var isAndroid = /android/i.test(navigator.userAgent);
        var isCapacitor = typeof window !== 'undefined' && !!(window.Capacitor);
        if (isAndroid || isCapacitor) {
          // Android status bar: 24-28px según densidad
          document.documentElement.style.setProperty('--status-bar-height', '28px');
          document.documentElement.style.setProperty('--header-top-padding', '28px');
        } else {
          document.documentElement.style.setProperty('--status-bar-height', '0px');
          document.documentElement.style.setProperty('--header-top-padding', '0px');
        }
      })();
    </script>
  </body>
</html>
